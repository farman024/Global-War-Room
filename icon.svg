<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" fill="#0D0D0D"/>

  <!-- Outer circle -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#FFD700" stroke-width="8"/>

  <!-- Inner circle -->
  <circle cx="256" cy="256" r="60" fill="none" stroke="#FFD700" stroke-width="5"/>

  <!-- Center dot -->
  <circle cx="256" cy="256" r="10" fill="#FFD700"/>

  <!-- Top line — gap around inner circle -->
  <line x1="256" y1="76" x2="256" y2="190" stroke="#FFD700" stroke-width="6"/>

  <!-- Bottom line -->
  <line x1="256" y1="322" x2="256" y2="436" stroke="#FFD700" stroke-width="6"/>

  <!-- Left line -->
  <line x1="76" y1="256" x2="190" y2="256" stroke="#FFD700" stroke-width="6"/>

  <!-- Right line -->
  <line x1="322" y1="256" x2="436" y2="256" stroke="#FFD700" stroke-width="6"/>

  <!-- Tick marks on outer circle — top -->
  <line x1="256" y1="76" x2="256" y2="96" stroke="#FFD700" stroke-width="8"/>
  <!-- bottom -->
  <line x1="256" y1="416" x2="256" y2="436" stroke="#FFD700" stroke-width="8"/>
  <!-- left -->
  <line x1="76" y1="256" x2="96" y2="256" stroke="#FFD700" stroke-width="8"/>
  <!-- right -->
  <line x1="416" y1="256" x2="436" y2="256" stroke="#FFD700" stroke-width="8"/>

  <!-- Corner arc segments — top left -->
  <path d="M 148 148 A 153 153 0 0 1 184 120" fill="none" stroke="#FFD700" stroke-width="4" opacity="0.5"/>
  <!-- top right -->
  <path d="M 328 120 A 153 153 0 0 1 364 148" fill="none" stroke="#FFD700" stroke-width="4" opacity="0.5"/>
  <!-- bottom left -->
  <path d="M 148 364 A 153 153 0 0 0 184 392" fill="none" stroke="#FFD700" stroke-width="4" opacity="0.5"/>
  <!-- bottom right -->
  <path d="M 328 392 A 153 153 0 0 0 364 364" fill="none" stroke="#FFD700" stroke-width="4" opacity="0.5"/>

  <!-- GWR text -->
  <text x="256" y="490"
        font-family="'Arial Narrow', Arial, sans-serif"
        font-size="32" font-weight="bold"
        fill="#FFD700" text-anchor="middle" letter-spacing="12">
    GWR
  </text>
</svg>
